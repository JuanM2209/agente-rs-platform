# ============================================================
# Cloudflare Tunnel Configuration
# nucleus-remote-access-portal
#
# Setup:
# 1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
# 2. cloudflared login
# 3. Route DNS:
#    cloudflared tunnel route dns api-dbv portal.datadesng.com
#    cloudflared tunnel route dns api-dbv api.datadesng.com
# 4. Run:
#    cloudflared tunnel --config infra/cloudflare/tunnel-config.yml run api-dbv
# ============================================================

tunnel: api-dbv

# Ingress rules — route public domains to local services
ingress:
  # Web portal
  - hostname: portal.datadesng.com
    service: http://localhost:3000
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s

  # API (for web app and direct API access)
  - hostname: api.datadesng.com
    service: http://localhost:8080
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s

  # Fallback
  - service: http_status:404
