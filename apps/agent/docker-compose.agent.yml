services:
  agente-rs:
    image: ghcr.io/juanm2209/agente-rs:latest
    container_name: agente-rs
    network_mode: host
    volumes:
      - /data/nucleus/factory:/data/nucleus/factory:ro
      # Optional if serial bridge support is needed and mbusd exists on host:
      # - /usr/local/bin/mbusd:/usr/local/bin/mbusd:ro
    environment:
      CONTROL_PLANE_URL: "wss://api.datadesng.com/ws/agent"
      AGENT_SECRET: "replace-with-real-agent-secret"
      TENANT_ID: "test-org"
      LOG_LEVEL: "info"
      HEARTBEAT_INTERVAL: "30s"
      INVENTORY_SCAN_INTERVAL: "60s"
    restart: unless-stopped
