name: CI

on:
  push:
    branches: [main, develop, master, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Frontend ----------------------------------------
  web:
    name: Web Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Type check
        run: npm run type-check

  # ---- Backend API -------------------------------------
  api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/api/go.mod

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out
        env:
          DATABASE_URL: postgresql://nucleus:nucleus_dev@localhost:5432/nucleus_portal
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-32-chars-minimum-here
          AGENT_WS_SECRET: test-agent-secret

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nucleus
          POSTGRES_PASSWORD: nucleus_dev
          POSTGRES_DB: nucleus_portal
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

  # ---- Agent -------------------------------------------
  agent:
    name: Go Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/agent/go.mod

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build ./...

      - name: Build (linux/arm)
        run: GOOS=linux GOARCH=arm GOARM=7 go build ./...

      - name: Test
        run: go test ./... -race

  # ---- Windows Helper ----------------------------------
  windows-helper:
    name: Windows Helper
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/windows-helper

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tools/windows-helper/go.mod

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build Windows binary
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o nucleus-helper.exe ./cmd

      - name: Test
        run: go test ./...

  # ---- Docker build check ------------------------------
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [web, api, agent]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent image
        uses: docker/build-push-action@v5
        with:
          context: apps/agent
          push: false
          platforms: linux/amd64,linux/arm/v7
          cache-from: type=gha
          cache-to: type=gha,mode=max
